  <text x="80" y="545" font-family="'DM Mono', monospace" font-size="16" fill="#666">Medellín, Colombia</text>
  <text x="80" y="568" font-family="'DM Mono', monospace" font-size="16" fill="#444">18+ years of experience · React · Node.js · TypeScript</text>
  <text x="1160" y="568" font-family="'DM Mono', monospace" font-size="16" fill="#c8f03c" text-anchor="end">famarin.dev</text>
