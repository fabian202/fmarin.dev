<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&amp;family=DM+Mono:wght@400;500&amp;display=swap');
  </style>

  <rect width="1200" height="630" fill="#0a0a0a"/>
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#222222" stroke-width="1"/>

  <!-- Accent top-left -->
  <rect x="40" y="40" width="80" height="4" fill="#c8f03c"/>
  <rect x="40" y="40" width="4" height="80" fill="#c8f03c"/>

  <!-- Accent bottom-right -->
  <rect x="1080" y="586" width="80" height="4" fill="#c8f03c"/>
  <rect x="1196" y="506" width="4" height="80" fill="#c8f03c"/>

  <!-- Tag -->
  <text x="80" y="110" font-family="'DM Mono', monospace" font-size="18" fill="#c8f03c" letter-spacing="4">SENIOR SOFTWARE ENGINEER</text>
