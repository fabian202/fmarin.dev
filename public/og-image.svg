  <!-- Name -->
  <text x="78" y="300" font-family="'Playfair Display', Georgia, serif" font-size="160" font-weight="900" fill="#f0ede6">Fabián</text>
  <text x="78" y="455" font-family="'Playfair Display', Georgia, serif" font-size="160" font-weight="900" fill="#c8f03c" font-style="italic">Marín</text>

